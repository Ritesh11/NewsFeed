name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
#Allows me to run this workflow manually fom Action tabs
  workflow_dispatch:

jobs:
  build:
    # We use ubuntu-latest because it has the C libraries and 
    # Android SDK pre-installed, avoiding the AAPT2 errors you saw on Windows.
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Verify Environment
      run: |
        echo "JAVA_HOME: $JAVA_HOME"
        java -version

    - name: Run a one line script
      run: echo Hello World
      
    - name: Run a multi line script
      run: |
        echo "Add another action to build,"
        echo "Test and deploy your project"
        
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: echo Run Lint

#      - name: Upload html test report
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: lint-report
#          path: app/build/reports/lint-results-debug.html

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run test
        run: echo Run Test

      # This runs all tests in the 'test' folder of your app module
#      - name: Run Unit Tests
#        run: ./gradlew testDebugUnitTest

#      - name: Upload Test Report
#        if: always() # Upload even if tests fail so you can see why
#        uses: actions/upload-artifact@v4
#        with:
#          name: unit-test-report
#          path: app/build/reports/tests/testDebugUnitTest/

  static-code-analysis:
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Static Code Analysis
        run: ./gradlew app:sonarqube -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env: GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}



